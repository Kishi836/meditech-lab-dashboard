<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meditech Lab — Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
  {% include "_icons.html" %}
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Meditech<span>Lab</span></div>
      <svg class="brand-ecg" viewBox="0 0 220 30" preserveAspectRatio="none" aria-hidden="true">
        <polyline pathLength="400" points="0,16 28,16 36,16 42,7 48,25 54,16 84,16 94,16 100,4 106,27 112,16 146,16 156,16 162,8 168,24 174,16 220,16"/>
      </svg>

      <nav class="nav">
        <button class="nav-item active" data-panel="help">
          <span class="nav-icon"><svg class="icon"><use href="#icon-help"/></svg></span> Help
        </button>
        <button class="nav-item" data-panel="patients">
          <span class="nav-icon"><svg class="icon"><use href="#icon-patients"/></svg></span> Patients
        </button>
        <button class="nav-item" data-panel="intake">
          <span class="nav-icon"><svg class="icon"><use href="#icon-intake"/></svg></span> Intake
        </button>
        <button class="nav-item" data-panel="extractor">
          <span class="nav-icon"><svg class="icon"><use href="#icon-extractor"/></svg></span> Extractor
        </button>
        <button class="nav-item" data-panel="coder">
          <span class="nav-icon"><svg class="icon"><use href="#icon-coder"/></svg></span> Coder
        </button>
        <button class="nav-item" data-panel="pipeline">
          <span class="nav-icon"><svg class="icon"><use href="#icon-pipeline"/></svg></span> Pipeline
        </button>
      </nav>

      <div class="status-strip">
        <div class="status-row">
          <span class="dot" id="dot-postgres"></span>
          <span class="status-label">Postgres</span>
        </div>
        <div class="status-row">
          <span class="dot" id="dot-es"></span>
          <span class="status-label">Elasticsearch</span>
        </div>
      </div>
    </aside>

    <main class="content">
      <section class="panel active" id="panel-help">
        {% include "help.html" %}
      </section>

      <section class="panel" id="panel-patients">
        {% include "patients.html" %}
      </section>

      <section class="panel" id="panel-intake">
        {% include "intake.html" %}
      </section>

      <section class="panel" id="panel-extractor">
        {% include "extractor.html" %}
      </section>

      <section class="panel" id="panel-coder">
        {% include "coder.html" %}
      </section>

      <section class="panel" id="panel-pipeline">
        {% include "pipeline.html" %}
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="{{ url_for('static', filename='js/pipesvg.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script src="{{ url_for('static', filename='js/patients.js') }}"></script>
  <script src="{{ url_for('static', filename='js/intake.js') }}"></script>
  <script src="{{ url_for('static', filename='js/extractor.js') }}"></script>
  <script src="{{ url_for('static', filename='js/coder.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pipeline.js') }}"></script>
</body>
</html>
